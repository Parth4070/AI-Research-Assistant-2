<!DOCTYPE html>
<html>

<head>
    <title>ResearchAI</title>
</head>

<body>

    <nav>

    <a href="{% url 'home' %}">Home</a>

    {% if user.is_authenticated %}

        <a href="{% url 'dashboard' %}">Dashboard</a>
        <a href="{% url 'projects_list' %}">My Projects</a>

        <span>Hello {{ user.username }}</span>

        <a href="{% url 'logout' %}">
            Logout
        </a>

    {% else %}

        <a href="{% url 'login' %}">
            Login
        </a>

        <a href="{% url 'register' %}">
            Register
        </a>

    {% endif %}

</nav>

<hr>

    <hr>

    {% block content %}
    {% endblock %}

</body>

</html>
