{% extends "base.html" %}

{% block content %}

<h2>My Projects</h2>

<p>
    <a href="{% url 'create_project' %}">
        + New Project
    </a>
</p>

{% if projects %}

<ul>

{% for project in projects %}

    <li>

        <a href="{% url 'project_detail' project.id %}">
            <strong>{{ project.title }}</strong>
        </a>

        <br>

        {{ project.description }}

    </li>

{% endfor %}

</ul>

{% else %}

<p>No projects yet.</p>

{% endif %}

{% endblock %}
