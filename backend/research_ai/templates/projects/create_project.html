{% extends "base.html" %}

{% block content %}

<div class="glass-card" style="max-width: 600px; margin: 2rem auto;">
    <h2 style="margin-bottom: 1.5rem;">Create New Project</h2>
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="{{ form.title.id_for_label }}">Project Title</label>
            {{ form.title }}
        </div>
        
        <div class="form-group">
            <label for="{{ form.description.id_for_label }}">Description</label>
            {{ form.description }}
        </div>

        <div style="display: flex; gap: 1rem; margin-top: 1rem;">
            <button type="submit" class="btn" style="flex: 1;">Create Project</button>
            <a href="{% url 'projects_list' %}" class="btn btn-outline" style="flex: 1;">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
