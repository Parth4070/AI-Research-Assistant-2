{% extends "base.html" %}

{% block content %}

<div class="glass-card" style="max-width: 450px; margin: 4rem auto; padding: 2.5rem 2rem;">
    <h2 style="text-align: center; margin-bottom: 2rem;">Sign In to ResearchAI</h2>

    {% if error %}
        <div class="alert alert-error" style="margin-bottom: 1.5rem;">
            ⚠️ {{ error }}
        </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" placeholder="Enter your username" required>
        </div>
        
        <div class="form-group" style="margin-top: 0.5rem;">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>

        <div style="margin-top: 1.5rem;">
            <button type="submit" class="btn" style="width: 100%; padding: 0.85rem;">
                Sign In
            </button>
        </div>
    </form>
    
    <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
        Don't have an account? <a href="{% url 'register' %}" style="font-weight: 600;">Register here</a>
    </div>
</div>

{% endblock %}
